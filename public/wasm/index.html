<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--Set visual viewport size for mobile devices to the device size,
        witch results in a scale of 1 and a 1:1 mapping between CSS pixels
        and Qt device independent pixels. -->
    <meta name="viewport" content="width=device-width, height=device-height, user-scalable=0"/>

    <title>wiredpanda</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- Analytics (Umami) with DNT respect -->
    <script>
      (function() {
        window.umami = window.umami || { track: function() {} };
        var dnt = navigator.doNotTrack || window.doNotTrack || navigator.msDoNotTrack;
        if (dnt !== "1" && dnt !== "yes") {
          var script = document.createElement('script');
          script.defer = true;
          script.src = 'https://cloud.umami.is/script.js';
          script.setAttribute('data-website-id', 'YOUR_UMAMI_WEBSITE_ID_HERE'); // TODO: Replace with your Umami Website ID
          document.head.appendChild(script);
        } else {
          console.info("Analytics disabled to respect Do Not Track preference.");
        }
      })();
    </script>
    <style>
      /* Make the html body cover the entire (visual) viewport with no scroll bars. */
      html, body { padding: 0; margin: 0; overflow: hidden; height: 100% }
      #screen { width: 100%; height: 100%; }
    </style>
  </head>
  <body onload="init()">
    <figure style="overflow:visible;" id="qtspinner">
      <center style="margin-top:1.5em; line-height:150%">
        <img src="qtlogo.svg" width="320" height="200" style="display:block"></img>
        <strong>Qt for WebAssembly: wiredpanda</strong>
        <div id="qtstatus"></div>
        <noscript>JavaScript is disabled. Please enable JavaScript to use this application.</noscript>
      </center>
    </figure>
    <div id="screen"></div>

    <script type="text/javascript">
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(element => element.style.display = 'none');
                if (screen === ui)
                    screen.style.position = 'default';
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading...';

                let wasmStartTime = 0;

                const instance = await qtLoad({
                    qt: {
                        onLoaded: () => {
                            showUi(screen);
                            if (window.umami) {
                                window.umami.track('WASM Demo Start');
                                wasmStartTime = Date.now();
                            }
                        },
                        onExit: exitData =>
                        {
                            if (window.umami && wasmStartTime > 0) {
                                const durationSec = Math.round((Date.now() - wasmStartTime) / 1000);
                                window.umami.track('WASM Demo Exit', { duration_seconds: durationSec, exit_code: exitData.code });
                            }
                            status.innerHTML = 'Application exit';
                            status.innerHTML +=
                                exitData.code !== undefined ? ` with code ${exitData.code}` : '';
                            status.innerHTML +=
                                exitData.text !== undefined ? ` (${exitData.text})` : '';
                            showUi(spinner);
                        },
                        entryFunction: window.wiredpanda_entry,
                        containerElements: [screen],
                        
                    }
                });

                // Track session if user closes the tab directly
                window.addEventListener('beforeunload', () => {
                    if (window.umami && wasmStartTime > 0) {
                        const durationSec = Math.round((Date.now() - wasmStartTime) / 1000);
                        // Send beacon-like request before unloads
                        window.umami.track('WASM Demo Session', { duration_seconds: durationSec });
                    }
                });
            } catch (e) {
                console.error(e);
                console.error(e.stack);
            }
        }
    </script>
    <script src="wiredpanda.js"></script>
<script src="coi-serviceworker.min.js"></script>
    <script type="text/javascript" src="qtloader.js"></script>
  </body>
</html>
