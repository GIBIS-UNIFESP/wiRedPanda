<!-- doxygen-awesome interactive extensions в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ -->
<script type="text/javascript" src="$relpath^doxygen-awesome-darkmode-toggle.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-fragment-copy-button.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-paragraph-link.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-interactive-toc.js"></script>
<script type="text/javascript" src="$relpath^doxygen-awesome-tabs.js"></script>
<script type="text/javascript">
  // Each extension is initialized independently: one throwing (e.g. a future
  // jQuery-dependent script failing) must not stop the others from running.
  [
    () => DoxygenAwesomeDarkModeToggle.init(),
    () => DoxygenAwesomeFragmentCopyButton.init(),
    () => DoxygenAwesomeParagraphLink.init(),
    () => DoxygenAwesomeInteractiveToc.init(),
    () => DoxygenAwesomeTabs.init(),
  ].forEach((init) => {
    try { init(); } catch (e) { console.error(e); }
  });

  // Sync with site-wide theme preference stored in localStorage
  (function() {
    var stored = localStorage.getItem('theme');
    var toggle = document.querySelector('doxygen-awesome-dark-mode-toggle');
    if (!toggle) return;
    // Listen to doxygen-awesome toggle changes and persist
    var observer = new MutationObserver(function() {
      var isDark = document.documentElement.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  })();
</script>
