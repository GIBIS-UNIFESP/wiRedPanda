name: Build

on:
  push:
    branches-ignore:
      - master
      - wasm
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .github/codeql/**
      - .github/dependabot.yml
      - .github/workflows/codeql.yml
      - .github/workflows/coverage.yml
      - .github/workflows/deploy.yml
      - .github/workflows/lint.yml
      - .github/workflows/sanitizers.yml
      - .github/workflows/translate.yml
      - .github/workflows/wasm.yml
      - Resources/Translations/**
      - Scripts/**
      - Tests/Fuzz/**

  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .github/codeql/**
      - .github/dependabot.yml
      - .github/workflows/codeql.yml
      - .github/workflows/coverage.yml
      - .github/workflows/deploy.yml
      - .github/workflows/lint.yml
      - .github/workflows/sanitizers.yml
      - .github/workflows/translate.yml
      - .github/workflows/wasm.yml
      - Resources/Translations/**
      - Scripts/**
      - Tests/Fuzz/**

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025-vs2026]
        qt: [6.8.3, 6.9.3]
        cmake_args: ['']
        include:
          - { os: ubuntu-24.04, qt: '6.9.3', cmake_args: '-DENABLE_UNITY=OFF -DENABLE_PCH=OFF' }
          - { os: ubuntu-24.04, qt: '6.9.3', cmake_args: '-DUNITY_BUILD_BATCH_SIZE=1000' }
          - { os: macos-15, qt: '6.8.3', cmake_args: '', qt_host: mac, qt_arch: clang_64 }
          - { os: macos-26, qt: '6.9.3', cmake_args: '', qt_host: mac, qt_arch: clang_64 }
          - { os: ubuntu-24.04-arm, qt: '6.9.3', cmake_args: '', qt_host: linux_arm64,   qt_arch: linux_gcc_arm64      }
          - { os: windows-11-arm,   qt: '6.9.3', cmake_args: '', qt_host: windows_arm64, qt_arch: win64_msvc2022_arm64 }

# =================================

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} Qt${{ matrix.qt }}${{ contains(matrix.cmake_args, 'ENABLE_UNITY=OFF') && ' (no unity/PCH)' || contains(matrix.cmake_args, 'BATCH_SIZE=1000') && ' (mega unity)' || '' }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    env:
      # pch_defines: allow PCH compiles to be cacheable (defines from the PCH itself don't change the hash).
      # time_macros: ignore __DATE__ / __TIME__ / __TIMESTAMP__ so unity-built TUs hash deterministically.
      # include_file_{c,m}time: ignore stat times on generated headers (MOC, qrc, unity .cxx files).
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_ctime,include_file_mtime

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'MCP/Client/requirements.txt'

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r MCP/Client/requirements.txt

    - name: Work around flaky packages.microsoft.com apt mirror
      if: runner.os == 'Linux'
      run: sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      with:
        version: ${{ matrix.qt }}
        cache: true
        aqtversion: ==3.*
        modules: qtmultimedia qtimageformats
        host: ${{ matrix.qt_host }}
        arch: ${{ matrix.qt_arch }}

    - name: ccache
      uses: hendrikmuhs/ccache-action@9e72c68cf32eb51fa30568928aca57ff79155270 # main
      with:
        key: ${{ matrix.os }}-${{ matrix.qt }}${{ contains(matrix.cmake_args, 'ENABLE_UNITY=OFF') && '-no-unity' || contains(matrix.cmake_args, 'BATCH_SIZE=1000') && '-mega-unity' || '' }}

    - name: Setup Windows MSVC Toolchain
      if: runner.os == 'Windows'
      uses: TheMrMilchmann/setup-msvc-dev@79dac248aac9d0059f86eae9d8b5bfab4e95e97c # v4.0.0
      with:
        arch: ${{ matrix.os == 'windows-11-arm' && 'arm64' || 'x64' }}

    # Crash-diagnostics setup: a crashed test only ever printed a bare signal number
    # before (see Scripts/ci_*.{sh,ps1} for the analysis side of this). core_pattern
    # is a kernel-wide (not per-shell) setting, so it only needs configuring once per
    # job, unlike ulimit below. gdb is not preinstalled on GitHub's ubuntu-24.04 image
    # (confirmed against actions/runner-images' own Ubuntu2404-Readme.md), unlike the
    # debian-i386 job's container, which installs it explicitly from scratch already.
    - name: Configure core dumps
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends gdb
        mkdir -p "$RUNNER_TEMP/cores"
        sudo bash -c 'echo "'"$RUNNER_TEMP"'/cores/%e.%p.%t" > /proc/sys/kernel/core_pattern'

    # Debugging Tools for Windows (cdb.exe) ships as part of the Windows Driver
    # Kit, which recent Windows runner images already bundle for other reasons
    # (confirmed present as "Windows Driver Kit Visual Studio Extension" in the
    # actual Windows2025-VS2026-Readme.md manifest) at a well-known, stable path
    # (confirmed via actions/runner-images#942) -- check there first rather than
    # reaching straight for choco's community "windbg" package, which has a real
    # history of breaking outright (404s when Microsoft moved the download,
    # per adamrehn/ue4-docker#92 and #109).
    #
    # Used to live-debug a crashed test on failure (Scripts/ci_windows_cdb_retry.ps1),
    # not to analyze a passively-captured WER dump: WER's LocalDumps can never
    # see a QTest crash on Windows, because QTest installs its own
    # SetUnhandledExceptionFilter handler that always reports the exception as
    # handled (confirmed directly against Qt's qtestcrashhandler_win.cpp source),
    # so the exception never reaches the OS path WER hooks into. A live debugger
    # attached via cdb sees it as a first-chance event before that filter runs.
    - name: Install Debugging Tools for Windows (cdb)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $arch = "${{ matrix.os == 'windows-11-arm' && 'arm64' || 'x64' }}"
        $cdbPath = "C:\Program Files (x86)\Windows Kits\10\Debuggers\$arch"
        if (Test-Path "$cdbPath\cdb.exe") {
          Write-Host "cdb.exe already present at $cdbPath -- adding to PATH"
          $cdbPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        } else {
          Write-Host "cdb.exe not found at $cdbPath -- falling back to choco"
          choco install windbg -y
        }

# =================================

    - name: Build
      run: |
        cmake --preset release ${{ matrix.cmake_args }}
        cmake --build --preset release

    - name: Test
      timeout-minutes: 10
      shell: bash
      env:
        QT_FORCE_STDERR_LOGGING: 1
      run: |
        if [ "$RUNNER_OS" = "Linux" ]; then ulimit -c unlimited; fi
        ctest --preset release -V -LE gui

    - name: Analyze crashed tests (Linux core dump)
      if: runner.os == 'Linux' && failure()
      run: ./Scripts/ci_linux_core_analyze.sh build-release/test_wiredpanda "$RUNNER_TEMP/cores" crash-diagnostics

    - name: Analyze crashed tests (macOS lldb retry)
      if: runner.os == 'macOS' && failure()
      run: ./Scripts/ci_macos_lldb_retry.sh build-release build-release/test_wiredpanda crash-diagnostics

    - name: Analyze crashed tests (Windows cdb retry)
      if: runner.os == 'Windows' && failure()
      shell: pwsh
      run: ./Scripts/ci_windows_cdb_retry.ps1 -BuildDir build-release -TestBinary build-release/test_wiredpanda.exe -OutDir crash-diagnostics

    # The gui-labeled suite (TestMainWindowGui's ~120 cases, TestDialogs,
    # TestFileDialogProvider, TestBewavedDolphinGui) is otherwise never executed in CI: every
    # ctest invocation across the workflows passes -LE gui. The test harness forces the
    # offscreen QPA platform on Linux (TestUtils::setupTestEnvironment), so these run headless
    # with no display. -FS skips the non_gui_complete fixture so only the gui tests run here —
    # the non-GUI suite already ran in the step above.
    - name: Test (GUI, headless)
      if: runner.os == 'Linux'
      timeout-minutes: 10
      env:
        QT_FORCE_STDERR_LOGGING: 1
      run: |
        ulimit -c unlimited
        ctest --preset release -V -L gui -FS non_gui_complete

    - name: Analyze crashed GUI tests (Linux core dump)
      if: runner.os == 'Linux' && failure()
      run: ./Scripts/ci_linux_core_analyze.sh build-release/test_wiredpanda "$RUNNER_TEMP/cores" crash-diagnostics

    # Trial runs of the gui suite off-Linux, non-blocking while they build a
    # track record (promote to blocking once proven stable; see the polling
    # AutoDismisser test hardening that unblocked this). macOS pins the
    # offscreen platform: the historical hang class was native-cocoa modal
    # activation timing. Windows tries the native platform first — its
    # runners already run the widget-creating non-gui suite natively and
    # green. Separate steps on purpose: a ternary env expression could set
    # QT_QPA_PLATFORM to "" (set-but-empty), which makes Qt load no platform.
    - name: Test (GUI, offscreen, trial)
      id: test-gui-macos-trial
      if: runner.os == 'macOS'
      timeout-minutes: 10
      continue-on-error: true
      env:
        QT_FORCE_STDERR_LOGGING: 1
        QT_QPA_PLATFORM: offscreen
      run: |
        ctest --preset release -V -L gui -FS non_gui_complete

    # continue-on-error above means a crash here doesn't make failure() true --
    # check this step's own outcome directly instead.
    - name: Analyze crashed GUI-trial tests (macOS lldb retry)
      if: runner.os == 'macOS' && steps.test-gui-macos-trial.outcome == 'failure'
      run: ./Scripts/ci_macos_lldb_retry.sh build-release build-release/test_wiredpanda crash-diagnostics

    - name: Test (GUI, native, trial)
      id: test-gui-windows-trial
      if: runner.os == 'Windows'
      timeout-minutes: 10
      continue-on-error: true
      env:
        QT_FORCE_STDERR_LOGGING: 1
      run: |
        ctest --preset release -V -L gui -FS non_gui_complete

    - name: Analyze crashed GUI-trial tests (Windows cdb retry)
      if: runner.os == 'Windows' && steps.test-gui-windows-trial.outcome == 'failure'
      shell: pwsh
      run: ./Scripts/ci_windows_cdb_retry.ps1 -BuildDir build-release -TestBinary build-release/test_wiredpanda.exe -OutDir crash-diagnostics

    - name: Smoke-test cmake --install
      shell: bash
      run: |
        PREFIX="${RUNNER_TEMP}/install-smoke"
        cmake --install build-release --prefix "$PREFIX"
        if [ "$RUNNER_OS" = "Windows" ]; then
          BIN="$PREFIX/bin/wiredpanda.exe"; EX="$PREFIX/bin/Examples"
        elif [ "$RUNNER_OS" = "macOS" ]; then
          BIN="$PREFIX/wiredpanda.app/Contents/MacOS/wiredpanda"; EX="$PREFIX/wiredpanda.app/Contents/Resources/Examples"
        else
          BIN="$PREFIX/bin/wiredpanda"; EX="$PREFIX/share/wiredpanda/Examples"
        fi
        [ -f "$BIN" ] || { echo "Error: installed binary missing at $BIN"; find "$PREFIX"; exit 1; }
        [ -d "$EX" ] && [ "$(find "$EX" -name '*.panda' | wc -l)" -gt 0 ] || { echo "Error: Examples missing/empty at $EX"; exit 1; }
        if [ "$RUNNER_OS" = "Linux" ]; then
          [ -f "$PREFIX/share/applications/wiredpanda.desktop" ] || { echo "Error: desktop file missing"; exit 1; }
          [ "$(find "$PREFIX/share/icons/hicolor" -name wpanda.png | wc -l)" -eq 5 ] || { echo "Error: expected 5 icon sizes"; exit 1; }
          [ -f "$PREFIX/share/mime/packages/wiredpanda.xml" ] || { echo "Error: mime XML missing"; exit 1; }
        fi

    - name: Upload build artifacts on failure
      # continue-on-error on the two GUI-trial steps means their failure alone
      # doesn't make failure() true -- check those steps' own outcomes too, or a
      # GUI-trial-only crash's diagnostics would never get uploaded.
      if: failure() || steps.test-gui-macos-trial.outcome == 'failure' || steps.test-gui-windows-trial.outcome == 'failure'
      uses: actions/upload-artifact@v7
      with:
        name: build-logs-${{ matrix.os }}-${{ matrix.qt }}${{ contains(matrix.cmake_args, 'ENABLE_UNITY=OFF') && '-no-unity' || contains(matrix.cmake_args, 'BATCH_SIZE=1000') && '-mega-unity' || '' }}
        # CMake 3.26+ writes CMakeConfigureLog.yaml (the old CMakeOutput.log /
        # CMakeError.log no longer exist); compile errors stream to the step log.
        # LastTest.log is the full console output of every test that ran, gui or
        # not, whichever ctest invocation ran last in this job. crash-diagnostics/
        # is written by the ci_*_analyze/retry scripts above, if anything crashed.
        path: |
          build-release/CMakeCache.txt
          build-release/CMakeFiles/CMakeConfigureLog.yaml
          build-release/Testing/Temporary/LastTest.log
          crash-diagnostics/
        retention-days: 7
        if-no-files-found: ignore

    - name: MCP Integration Test
      run: |
        python3 MCP/Client/run_tests.py

# =================================

  # 32-bit (i386) coverage. Qt ships no 32-bit Linux binaries (neither the
  # official installer nor aqtinstall / install-qt-action), and Ubuntu dropped
  # Qt6 for i386 — only Debian still packages it. So we build inside a Debian
  # i386 container using distro Qt; i386 runs natively on the amd64 runner
  # kernel (no qemu). Checkout runs on the host because GitHub's Node is amd64
  # and won't execute in an i386 userland; only the build + test run in the
  # container. This guards against 32-bit-only regressions like #406, which the
  # main matrix can't catch.
  build-linux-32bit:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    name: debian-i386 Qt6 (32-bit)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0

    - name: ccache
      uses: actions/cache@v6
      with:
        path: ${{ runner.temp }}/ccache-i386
        key: i386-ccache-${{ github.sha }}
        restore-keys: i386-ccache-

    # qt6-svg-plugins provides the SVG image-format plugin (loaded at runtime by
    # QPixmap); it is NOT pulled in by qt6-svg-dev and the suite aborts without
    # it. qt6-image-formats-plugins mirrors the qtimageformats module the matrix
    # installs. Tests run as a non-root user so the filesystem-permission tests
    # behave like a normal build (root bypasses permission bits). GUI tests are
    # excluded (-LE gui) to match the other CI jobs; the offscreen platform still
    # applies to the non-GUI tests that instantiate a QApplication.
    - name: Build & test in Debian i386 container
      timeout-minutes: 20
      run: |
        # Build dir and ccache live on the host (under $RUNNER_TEMP) and are
        # bind-mounted into the container: the build dir so artifacts survive the
        # --rm container for failure upload, the ccache dir so actions/cache (the
        # step above) persists it across runs. CMake auto-detects ccache as the
        # compiler launcher; same CCACHE_SLOPPINESS as the matrix job for unity/PCH.
        WORK_DIR="$RUNNER_TEMP/work-i386"
        CACHE_DIR="$RUNNER_TEMP/ccache-i386"
        mkdir -p "$WORK_DIR" "$CACHE_DIR"
        # /proc/sys/kernel/core_pattern must be set from the HOST: confirmed
        # (not assumed) that a non-privileged container's own /proc/sys is
        # read-only, so writing it from inside the container fails with
        # "Read-only file system".
        #
        # The pattern itself must be an ABSOLUTE path, not a relative one:
        # test_wiredpanda runs under `su builder` inside the container (see
        # below), and a process whose credentials changed via su/sudo/setuid
        # is subject to /proc/sys/fs/suid_dumpable's rules regardless of
        # whether the executable file itself has the setuid bit -- confirmed
        # or was a real, empirically-hit bug here: this host's suid_dumpable
        # is 2 ("suidsafe"), and core(5) documents that suid_dumpable=2
        # requires an absolute pattern (or a pipe); a relative one is
        # silently rejected (no core file, no error). An absolute pattern
        # still resolves against the *crashing process's own* mount
        # namespace root (per core(5)), so /work/... (not the host's
        # $WORK_DIR) is what must appear here -- it reaches the same
        # bind-mounted directory from the container's side.
        sudo bash -c 'echo "/work/cores/%e.%p.%t" > /proc/sys/kernel/core_pattern'
        docker run --rm -i \
          -v "$PWD":/src \
          -v "$WORK_DIR":/work \
          -v "$CACHE_DIR":/ccache \
          i386/debian:trixie bash -s <<'EOF'
        set -eu
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y --no-install-recommends \
          build-essential cmake ninja-build ccache pkg-config git ca-certificates gdb \
          qt6-base-dev qt6-multimedia-dev qt6-svg-dev qt6-svg-plugins \
          qt6-image-formats-plugins libgl1-mesa-dev libglu1-mesa-dev
        # Run as a non-root user that OWNS the checkout (matches /src's uid), like
        # the other CI jobs do: some tests write into the source tree (e.g. TestIC
        # saves into the examples dir), and non-root keeps the permission tests
        # (TestWorkspace) honest.
        useradd -o -u "$(stat -c %u /src)" -m builder
        chown builder /work /ccache
        su builder -c '
          set -eu
          export CCACHE_DIR=/ccache
          export CCACHE_SLOPPINESS=pch_defines,time_macros,include_file_ctime,include_file_mtime
          git config --global --add safe.directory /src
          cmake -S /src -B /work -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build /work
          cd /work
          export QT_QPA_PLATFORM=offscreen QT_FORCE_STDERR_LOGGING=1
          # core_pattern (see the host-side comment above this docker run
          # invocation) is already configured before this container started --
          # only the cores/ subdirectory it resolves into needs creating here.
          mkdir -p cores
          ulimit -c unlimited
          set +e
          ctest -V -j$(nproc) -LE gui
          CTEST_EXIT=$?
          set -e
          if [ "$CTEST_EXIT" -ne 0 ]; then
            /src/Scripts/ci_linux_core_analyze.sh ./test_wiredpanda ./cores ./crash-diagnostics || true
          fi
          exit "$CTEST_EXIT"
        '
        EOF

    - name: Upload build artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: build-logs-debian-i386
        # CMake 3.26+ writes CMakeConfigureLog.yaml (the old CMakeOutput.log /
        # CMakeError.log no longer exist); compile errors stream to the step log.
        # crash-diagnostics/ is written under /work (bind-mounted from
        # work-i386 below) by ci_linux_core_analyze.sh above, if anything crashed.
        path: |
          ${{ runner.temp }}/work-i386/CMakeCache.txt
          ${{ runner.temp }}/work-i386/CMakeFiles/CMakeConfigureLog.yaml
          ${{ runner.temp }}/work-i386/Testing/Temporary/LastTest.log
          ${{ runner.temp }}/work-i386/crash-diagnostics/
        retention-days: 7
        if-no-files-found: ignore
