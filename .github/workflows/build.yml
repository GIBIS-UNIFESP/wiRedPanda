name: Build

on:
  push:
    branches-ignore:
      - master
      - wasm

  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        qt: [6.2.4, 6.8.3, 6.10.3]
        cmake_args: ['']
        include:
          - os: ubuntu-latest
            qt: '6.8.3'
            cmake_args: '-DENABLE_UNITY=OFF -DENABLE_PCH=OFF'
          - os: ubuntu-latest
            qt: '6.8.3'
            cmake_args: '-DUNITY_BUILD_BATCH_SIZE=1000'

# =================================

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} Qt${{ matrix.qt }}${{ contains(matrix.cmake_args, 'ENABLE_UNITY=OFF') && ' (no unity/PCH)' || contains(matrix.cmake_args, 'BATCH_SIZE=1000') && ' (mega unity)' || '' }}
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt }}
        cache: true
        aqtversion: ==3.*
        modules: qtmultimedia qtimageformats

    - name: ccache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: ${{ matrix.os }}-${{ matrix.qt }}${{ contains(matrix.cmake_args, 'ENABLE_UNITY=OFF') && '-no-unity' || contains(matrix.cmake_args, 'BATCH_SIZE=1000') && '-mega-unity' || '' }}

    - name: Setup Windows MSVC Toolchain
      if: runner.os == 'Windows'
      uses: seanmiddleditch/gha-setup-vsdevenv@v5

# =================================

    - name: Build
      run: |
        cmake --preset release ${{ matrix.cmake_args }}
        cmake --build --preset release

    - name: Test
      timeout-minutes: 10
      env:
        QT_FORCE_STDERR_LOGGING: 1
      run: |
        ctest --preset release -V

    - name: Upload build artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-logs-${{ matrix.os }}-${{ matrix.qt }}${{ contains(matrix.cmake_args, 'ENABLE_UNITY=OFF') && '-no-unity' || contains(matrix.cmake_args, 'BATCH_SIZE=1000') && '-mega-unity' || '' }}
        path: |
          build/CMakeCache.txt
          build/CMakeFiles/CMakeOutput.log
          build/CMakeFiles/CMakeError.log
        retention-days: 7
