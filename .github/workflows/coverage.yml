name: Coverage

on:
  push:
    branches:
      - master

jobs:
  Ubuntu-Qt6_9_3-Code_Coverage:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    env:
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_ctime,include_file_mtime

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      with:
        version: 6.9.3
        cache: true
        aqtversion: ==3.*
        modules: qtmultimedia qtimageformats

    - name: ccache
      uses: hendrikmuhs/ccache-action@13c5b28e4a76834446e40f66722377da0514d5a0 # main
      with:
        key: coverage-${{ runner.os }}

    - name: Build
      run: |
        cmake --preset coverage
        cmake --build --preset coverage

    - name: Test
      timeout-minutes: 10
      run: |
        ctest --preset coverage -V -LE gui

    - name: Generate gcov reports
      run: |
        cd build-coverage
        gcov -abcfu $(find . -name "*.gcno")

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: build-coverage
        fail_ci_if_error: true
        verbose: true

    - name: Upload build artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-build-logs
        path: |
          build-coverage/CMakeCache.txt
          build-coverage/CMakeFiles/CMakeOutput.log
          build-coverage/CMakeFiles/CMakeError.log
        retention-days: 7
