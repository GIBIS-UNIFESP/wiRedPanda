name: Coverage

on:
  push:
    branches:
      - master

jobs:
  Ubuntu-Qt6_9_3-Code_Coverage:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    env:
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_ctime,include_file_mtime

    steps:
    - uses: actions/checkout@v7.0.0
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Work around flaky packages.microsoft.com apt mirror
      if: runner.os == 'Linux'
      run: sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      with:
        version: 6.9.3
        cache: true
        aqtversion: ==3.*
        modules: qtmultimedia qtimageformats

    - name: ccache
      uses: hendrikmuhs/ccache-action@9e72c68cf32eb51fa30568928aca57ff79155270 # main
      with:
        key: coverage-${{ runner.os }}

    - name: Build
      run: |
        cmake --preset coverage
        cmake --build --preset coverage

    - name: Test
      timeout-minutes: 10
      run: |
        ctest --preset coverage -V -LE gui

    # Same headless environment that runs green in build.yml; also lifts
    # coverage of the MainWindow/dialog/BeWavedDolphin UI paths that only
    # these four classes exercise.
    - name: Test (GUI, headless)
      timeout-minutes: 10
      run: |
        ctest --preset coverage -V -L gui -FS non_gui_complete

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'MCP/Client/requirements.txt'

    - name: Install MCP client dependencies
      run: pip install -r MCP/Client/requirements.txt

    # Exercise the MCP/Server C++ paths through the Python integration suite,
    # driving the coverage-instrumented binary so its subprocess .gcda files
    # are written (the server exits cleanly on stdin EOF). Must run before gcov.
    - name: MCP Integration Test (instrumented)
      timeout-minutes: 10
      env:
        QT_QPA_PLATFORM: offscreen
        WIREDPANDA_EXE: ${{ github.workspace }}/build-coverage/wiredpanda
      run: python3 MCP/Client/run_tests.py

    - name: Generate gcov reports
      run: |
        cd build-coverage
        gcov -abcfu $(find . -name "*.gcno")

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: build-coverage
        fail_ci_if_error: true
        verbose: true

    - name: Upload build artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-build-logs
        path: |
          build-coverage/CMakeCache.txt
          build-coverage/CMakeFiles/CMakeOutput.log
          build-coverage/CMakeFiles/CMakeError.log
        retention-days: 7
