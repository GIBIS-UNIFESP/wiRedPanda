name: Publish to AUR

on:
  release:
    types: [published]
  workflow_dispatch:

# Enable by setting repository variable PUBLISH_AUR_ENABLED=true and
# adding the AUR_SSH_KEY secret (SSH private key registered on
# aur.archlinux.org under the maintainer account).

jobs:
  publish:
    if: vars.PUBLISH_AUR_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Patch pkgver and sha256sums
        run: |
          TARBALL_URL="https://github.com/GIBIS-UNIFESP/wiRedPanda/archive/refs/tags/${VERSION}.tar.gz"
          SHA256=$(curl -fsSL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" Packaging/aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA256')/" Packaging/aur/PKGBUILD

      - name: Publish PKGBUILD to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4
        with:
          pkgname: wiredpanda
          pkgbuild: Packaging/aur/PKGBUILD
          commit_username: Rodrigo Torres
          commit_email: torres.dark@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: Update to ${{ env.VERSION }}
