name: Sanitizers

on:
  push:
    branches-ignore:
      - master
      - wasm
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .github/codeql/**
      - .github/dependabot.yml
      - .github/workflows/build.yml
      - .github/workflows/codeql.yml
      - .github/workflows/coverage.yml
      - .github/workflows/deploy.yml
      - .github/workflows/lint.yml
      - .github/workflows/translate.yml
      - .github/workflows/wasm.yml
      - MCP/**
      - Resources/Translations/**
      - Scripts/**
      - Tests/Fuzz/**

  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**/*.md"
      - LICENSE
      - .github/codeql/**
      - .github/dependabot.yml
      - .github/workflows/build.yml
      - .github/workflows/codeql.yml
      - .github/workflows/coverage.yml
      - .github/workflows/deploy.yml
      - .github/workflows/lint.yml
      - .github/workflows/translate.yml
      - .github/workflows/wasm.yml
      - MCP/**
      - Resources/Translations/**
      - Scripts/**
      - Tests/Fuzz/**

jobs:
  sanitize:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]

    runs-on: ubuntu-latest
    name: Ubuntu Qt6.9.3 (${{ matrix.sanitizer }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    env:
      # pch_defines: allow PCH compiles to be cacheable (defines from the PCH itself don't change the hash).
      # time_macros: ignore __DATE__ / __TIME__ / __TIMESTAMP__ so unity-built TUs hash deterministically.
      # include_file_{c,m}time: ignore stat times on generated headers (MOC, qrc, unity .cxx files).
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_ctime,include_file_mtime

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Work around flaky packages.microsoft.com apt mirror
      if: runner.os == 'Linux'
      run: sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list

    - name: Install Qt
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      with:
        version: 6.9.3
        cache: true
        aqtversion: ==3.*
        modules: qtmultimedia qtimageformats

    - name: ccache
      uses: hendrikmuhs/ccache-action@9e72c68cf32eb51fa30568928aca57ff79155270 # main
      with:
        key: ${{ matrix.sanitizer }}-ubuntu-6.9.3

    - name: Build
      run: |
        cmake --preset ${{ matrix.sanitizer }}
        cmake --build --preset ${{ matrix.sanitizer }}

    - name: Test
      timeout-minutes: 15
      env:
        QT_FORCE_STDERR_LOGGING: 1
        ASAN_OPTIONS: abort_on_error=1:halt_on_error=1
        # LSan suppresses third-party leaks (PulseAudio via Qt Multimedia, etc.)
        # so real application leaks still surface.  Application leaks must be
        # fixed, not added to the suppression list.
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/Tests/lsan_suppressions.txt
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: |
        ctest --preset ${{ matrix.sanitizer }} -V -LE gui

    # The gui suite under sanitizers is where teardown-order UAFs (the
    # WIREDPANDA-HC / MainWindow-destruction class of intermittent segfault)
    # become deterministic instead of once-a-month. Non-blocking while it
    # accumulates a track record; promote to blocking once proven stable.
    - name: Test (GUI, headless)
      timeout-minutes: 15
      continue-on-error: true
      env:
        QT_FORCE_STDERR_LOGGING: 1
        ASAN_OPTIONS: abort_on_error=1:halt_on_error=1
        LSAN_OPTIONS: suppressions=${{ github.workspace }}/Tests/lsan_suppressions.txt
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: |
        ctest --preset ${{ matrix.sanitizer }} -V -L gui -FS non_gui_complete

    - name: Upload build artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.sanitizer }}-build-logs
        path: |
          build-${{ matrix.sanitizer }}/CMakeCache.txt
          build-${{ matrix.sanitizer }}/CMakeFiles/CMakeOutput.log
          build-${{ matrix.sanitizer }}/CMakeFiles/CMakeError.log
          build-${{ matrix.sanitizer }}/Testing/Temporary/LastTest.log
        retention-days: 7
