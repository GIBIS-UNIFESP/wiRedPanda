name: Publish to Launchpad PPA

on:
  release:
    types: [published]
  workflow_dispatch:

# Enable by setting:
#   - repository variable PUBLISH_PPA_ENABLED=true
#   - repository variable PPA_NAME (defaults to gibis-unifesp/wiredpanda)
#   - secret DEB_SIGN_KEY: ASCII-armored GPG private key (passphrase-less
#     CI key recommended; uploaded to keyserver and to the Launchpad
#     profile so the PPA build accepts the signature)

jobs:
  source-upload:
    if: vars.PUBLISH_PPA_ENABLED == 'true'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      # Refresh this list to the currently-supported Ubuntu series before enabling
      # this channel — oracular (24.10) reached end-of-life 9 months after its Oct
      # 2024 release and this list predates at least one newer LTS. Don't carry a
      # dead series forward on faith; check https://endoflife.date/ubuntu (or
      # equivalent) at enable time rather than guessing here.
      matrix:
        series: [jammy, noble, oracular]
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            devscripts debhelper dput gnupg ca-certificates

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"

      - name: Import GPG signing key
        env:
          KEY: ${{ secrets.DEB_SIGN_KEY }}
        run: |
          echo "$KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/ { print $5; exit }')
          echo "GPG_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"

      - name: Configure dput
        run: |
          PPA="${{ vars.PPA_NAME }}"
          [ -z "$PPA" ] && PPA="gibis-unifesp/wiredpanda"
          echo "PPA=$PPA" >> "$GITHUB_ENV"
          cat > ~/.dput.cf <<EOF
          [ppa]
          fqdn = ppa.launchpad.net
          method = ftp
          incoming = ~$PPA/ubuntu/
          login = anonymous
          allow_unsigned_uploads = 0
          EOF

      - name: Download upstream tarball
        run: |
          curl -fsSL "https://github.com/GIBIS-UNIFESP/wiRedPanda/archive/refs/tags/${VERSION}.tar.gz" \
            -o "wiredpanda_${VERSION}.orig.tar.gz"

      - name: Prepare source tree
        run: |
          tar xzf "wiredpanda_${VERSION}.orig.tar.gz"
          mv "wiRedPanda-${VERSION}" "wiredpanda-${VERSION}"
          cp -r Packaging/debian "wiredpanda-${VERSION}/debian"
          chmod +x "wiredpanda-${VERSION}/debian/rules"

      - name: Render per-series changelog
        run: |
          DATE=$(date -R)
          cat > "wiredpanda-${VERSION}/debian/changelog" <<EOF
          wiredpanda (${VERSION}-0~ubuntu${{ matrix.series }}1) ${{ matrix.series }}; urgency=medium

            * Release ${VERSION}.

           -- Rodrigo Torres <torres.dark@gmail.com>  ${DATE}
          EOF

      - name: Build signed source package
        working-directory: wiredpanda-${{ env.VERSION }}
        run: |
          debuild -S -sa -k${GPG_KEY_ID} --no-lintian

      - name: Upload to PPA
        run: dput ppa "wiredpanda_${VERSION}-0~ubuntu${{ matrix.series }}1_source.changes"
