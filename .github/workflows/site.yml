name: Deploy to GitHub Pages

on:
  push:
    branches: [site]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint

      - name: Format check
        run: npm run format:check

      - name: Checkout master source for Doxygen
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: master
          path: master-src

      - name: Install Doxygen
        run: |
          curl -sL https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz -o doxygen.tar.gz
          tar xzf doxygen.tar.gz
          echo "$PWD/doxygen-1.16.1/bin" >> "$GITHUB_PATH"
          sudo apt-get update && sudo apt-get install -y --no-install-recommends graphviz

      - name: Generate API docs
        run: doxygen Doxyfile

      - name: Copy API docs to site
        run: cp -r docs/html public/api

      - name: Build and upload
        uses: withastro/action@b7d53628f8b666036b0238aadb0b984a2a489f26 # v6
        with:
          node-version: 24

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
