name: Update latest release data

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-24.04
    # Deploy's build matrix (5 platforms) uploads release assets from within each job; a
    # workflow_run "completed" event only fires once every one of those jobs has finished, and
    # conclusion == 'success' means all of them did -- so assets are guaranteed present by the
    # time this runs. Triggering directly off `release: published` (the previous approach) raced
    # against Deploy: this job would resolve and commit real-looking-but-actually-null asset URLs
    # before any binary had been built, let alone uploaded.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout site branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: site

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24

      - name: Fetch and resolve latest release assets
        run: node scripts/update-release-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "wiRedPanda CI"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/latest-release.json
          git diff --cached --quiet || git commit -m "chore: update latest release data"
          git push

      - name: Trigger site rebuild
        # The push above authenticates as GITHUB_TOKEN, which GitHub excludes from triggering
        # other on:push workflows (anti-loop protection) -- so site.yml's `on: push: branches:
        # [site]` never fires from it. workflow_dispatch is explicitly exempt from that
        # restriction, so dispatch the site build directly instead of relying on the push.
        run: gh workflow run "Deploy to GitHub Pages" --repo ${{ github.repository }} --ref site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
