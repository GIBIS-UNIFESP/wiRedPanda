name: Update latest release data

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout site branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: site

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Fetch and resolve latest release assets
        run: node scripts/update-release-data.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "wiRedPanda CI"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/latest-release.json
          git diff --cached --quiet || git commit -m "chore: update latest release data"
          git push
