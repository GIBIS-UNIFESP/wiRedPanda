name: Lint

# Python trees covered: MCP/Client/ (full suite) and Scripts/, Tests/Fixtures/,
# Tests/Integration/IC/Generators/ (ruff + pylint + pyrefly + vulture).
# C++, CMake, translations, and deploy scripts fall through to build.yml.
# Workflow YAML itself (.github/workflows/**) is covered here too, by actionlint.
on:
  push:
    branches-ignore:
      - master
      - wasm
    paths:
      - 'MCP/Client/**'
      - 'Scripts/**'
      - 'Tests/Fixtures/**'
      - 'Tests/Integration/IC/Generators/**'
      - 'ruff.toml'
      - '.pylintrc'
      - 'pyrefly.toml'
      - '.github/workflows/**'

  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
    paths:
      - 'MCP/Client/**'
      - 'Scripts/**'
      - 'Tests/Fixtures/**'
      - 'Tests/Integration/IC/Generators/**'
      - 'ruff.toml'
      - '.pylintrc'
      - 'pyrefly.toml'
      - '.github/workflows/**'

jobs:
  python-lint:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    name: Python lint (MCP/Client)
    # Same fork-PR guard as build.yml: GITHUB_TOKEN on forked PRs has no write
    # permissions, and we don't want to run untrusted code with our caches.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    defaults:
      run:
        working-directory: MCP/Client

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'MCP/Client/requirements.txt'

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # Lint steps run sequentially with default fail-fast: the first failure
    # stops the job. The 8 tools are intentionally separate steps (rather
    # than chained with `&&`) so the failing tool is visible in the job UI
    # without scraping logs.

    - name: ruff check
      run: ruff check .

    - name: ruff format
      run: ruff format --check .

    - name: mypy
      run: mypy .

    - name: pyright
      run: pyright .

    - name: pyrefly
      run: pyrefly check

    - name: vulture
      run: vulture --min-confidence 80 --exclude '.venv' .

    - name: pylint
      run: pylint --rcfile=../../.pylintrc mcp_client/ domain/ protocol/ tests/ examples/ minimal_test.py run_tests.py

    - name: deptry
      run: deptry .

    - name: import-linter
      run: lint-imports

  python-lint-scripts:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    name: Python lint (Scripts/Fixtures/Generators)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-python@v7
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'MCP/Client/requirements.txt'

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r MCP/Client/requirements.txt

    - name: ruff check
      run: ruff check Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/

    - name: ruff format
      run: ruff format --check Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/

    - name: pylint
      run: pylint Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/

    - name: pyrefly
      run: pyrefly check Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/

    - name: vulture
      run: >-
        vulture --min-confidence 80
        Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/

  actionlint:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    name: actionlint (.github/workflows)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v7

    # reporter: local prints results to the job log instead of posting PR
    # annotations, so this needs no extra permissions beyond contents: read.
    # fail_level: error is required - the action's own default (none) always
    # exits 0, which would make this step pass even on a schema-invalid file.
    # filter_mode: nofilter - the default (file) makes reviewdog compute a diff
    # to scope results to changed files, which needs a -diff command the action
    # doesn't configure; outside a pull_request that fails outright ("diff
    # command is empty"). This gate validates the whole tree, not just a diff,
    # so skip diff computation entirely.
    # shellcheck is disabled (-shellcheck=): its style/info-level findings on the
    # embedded run: scripts are a separate, pre-existing concern across several
    # workflow files, not what this gate is for - it's scoped to schema/expression
    # validity (e.g. the secrets-in-if: class of bug this gate was added to catch).
    - name: actionlint
      uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
      with:
        fail_level: error
        reporter: local
        filter_mode: nofilter
        actionlint_flags: -shellcheck=
