name: Lint

# Python trees covered: MCP/Client/ (full suite) and Scripts/, Tests/Fixtures/,
# Tests/Integration/IC/Generators/ (ruff only so far).
# C++, CMake, translations, and deploy scripts fall through to build.yml.
on:
  push:
    branches-ignore:
      - master
      - wasm
    paths:
      - 'MCP/Client/**'
      - 'Scripts/**'
      - 'Tests/Fixtures/**'
      - 'Tests/Integration/IC/Generators/**'
      - 'ruff.toml'
      - '.github/workflows/lint.yml'

  pull_request:
    branches:
      - master
    types: [opened, synchronize, reopened]
    paths:
      - 'MCP/Client/**'
      - 'Scripts/**'
      - 'Tests/Fixtures/**'
      - 'Tests/Integration/IC/Generators/**'
      - 'ruff.toml'
      - '.github/workflows/lint.yml'

jobs:
  python-lint:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    name: Python lint (MCP/Client)
    # Same fork-PR guard as build.yml: GITHUB_TOKEN on forked PRs has no write
    # permissions, and we don't want to run untrusted code with our caches.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    defaults:
      run:
        working-directory: MCP/Client

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'MCP/Client/requirements.txt'

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    # Lint steps run sequentially with default fail-fast: the first failure
    # stops the job. The 8 tools are intentionally separate steps (rather
    # than chained with `&&`) so the failing tool is visible in the job UI
    # without scraping logs.

    - name: ruff check
      run: ruff check .

    - name: ruff format
      run: ruff format --check .

    - name: mypy
      run: mypy .

    - name: pyright
      run: pyright .

    - name: pyrefly
      run: pyrefly check

    - name: vulture
      run: vulture --min-confidence 80 --exclude '.venv' .

    - name: pylint
      run: pylint mcp_client/ domain/ protocol/ tests/ examples/ minimal_test.py run_tests.py

    - name: deptry
      run: deptry .

    - name: import-linter
      run: lint-imports

  python-lint-scripts:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    name: Python lint (Scripts/Fixtures/Generators)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: 'MCP/Client/requirements.txt'

    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install -r MCP/Client/requirements.txt

    - name: ruff check
      run: ruff check Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/

    - name: ruff format
      run: ruff format --check Scripts/ Tests/Fixtures/ Tests/Integration/IC/Generators/
