name: Build WebAssembly

on:
  push:
    branches:
      - wasm

jobs:
  build-wasm:
    permissions:
      contents: write  # needed to push to site branch
      actions: write   # needed to trigger site deployment
    runs-on: ubuntu-24.04

    env:
      CCACHE_SLOPPINESS: pch_defines,time_macros,include_file_ctime,include_file_mtime

    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Work around flaky packages.microsoft.com apt mirror
      if: runner.os == 'Linux'
      run: sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list

    # Install the host Qt explicitly (with qttools) so qt_add_translations
    # can find Qt6LinguistTools.  --autodesktop on the WASM step installs a
    # base host Qt, but without qttools, lrelease/lupdate aren't available
    # and qt_add_translations silently no-ops — leaving the WASM build with
    # no embedded translations and an English-only language menu.
    - name: Setup Qt (host, for LinguistTools)
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      with:
        version: 6.9.3
        host: linux
        target: desktop
        arch: linux_gcc_64
        # qtbase (the default install) ships lrelease/lupdate and the
        # Qt6LinguistToolsConfig.cmake that qt_add_translations needs;
        # no extra aqt module is required ("qttools" isn't a valid aqt
        # module for Qt 6 — LinguistTools is part of the base install).
        cache: true
        aqtversion: ==3.*

    - name: Setup Qt for WASM
      uses: jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730 # v4.3.1
      with:
        version: 6.9.3
        host: all_os
        target: wasm
        arch: wasm_multithread
        modules: qtmultimedia qtimageformats
        cache: true

    - name: Setup emscripten
      run: |
        git clone https://github.com/emscripten-core/emsdk
        cd emsdk
        ./emsdk install 3.1.70
        ./emsdk activate 3.1.70

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@9e72c68cf32eb51fa30568928aca57ff79155270 # main
      with:
        key: wasm-${{ runner.os }}

    - name: Build WASM
      run: |
        source ./emsdk/emsdk_env.sh
        qt-cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
        cmake --build build --target wiredpanda

    - name: Commit to site branch
      if: success()
      run: |
        # Configure Git with your user details
        git config --global user.name "Rodrigo Torres"
        git config --global user.email "5768540+darktorres@users.noreply.github.com"

        # Checkout the site branch
        git checkout site

        # Copy only the necessary WASM files to the public folder
        mkdir -p ./public/wasm
        cp ./build/wiredpanda.js ./public/wasm/
        cp ./build/wiredpanda.wasm ./public/wasm/
        cp ./build/wiredpanda.data ./public/wasm/
        cp ./build/index.html ./public/wasm/
        cp ./build/coi-serviceworker.min.js ./public/wasm/

        # Copy optional files with explicit handling
        [ -f ./build/favicon.ico ] && cp ./build/favicon.ico ./public/wasm/ || echo "favicon.ico not found, skipping"
        [ -f ./build/qtloader.js ] && cp ./build/qtloader.js ./public/wasm/ || echo "qtloader.js not found, skipping"
        [ -f ./build/qtlogo.svg ] && cp ./build/qtlogo.svg ./public/wasm/ || echo "qtlogo.svg not found, skipping"

        # Stage and commit the changes
        git add ./public/wasm/
        git commit -m "Deploy WASM files"

        # Push changes to the site branch
        git push origin site
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trigger site deployment workflow
      run: |
        curl -X POST \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/site.yml/dispatches \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github+json" \
          -d '{"ref": "site"}'
