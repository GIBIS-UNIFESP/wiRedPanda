name: "wiRedPanda CodeQL — C++"

# security-and-quality is a strict superset of security-extended.  Adds
# correctness rules (uninitialized vars, missing returns, double-free,
# leak-on-throw) and maintainability checks on top of the security suite.
queries:
  - uses: security-and-quality

paths-ignore:
  - Examples
  - Resources/Translations
  - Tests/BackwardCompatibility
  - Tests/Fuzz/regressions
  - "**/*.md"
  # All build-tree artifacts (FetchContent deps, Unity builds, Qt MOC autogen)
  - "build-*/**"
