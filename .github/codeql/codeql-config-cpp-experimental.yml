name: "wiRedPanda CodeQL — C++ experimental"

# Experimental queries surface novel patterns (tainted integer overflow,
# allocator misuse, more aggressive UB detection) at lower precision than
# the stable suites.  Run scheduled-only so noisy findings don't gate PRs.
queries:
  - uses: security-experimental

query-filters:
  # False positive: rule does not understand Qt's value-type semantics.
  # QString, QStringList, QByteArray, and QJsonValue::toString() all produce
  # independent value copies — no dangling reference is involved.  The rule is
  # tagged "experimental" upstream for exactly this reason.
  - exclude:
      id: cpp/use-after-expired-lifetime

paths-ignore:
  - Examples
  - Resources/Translations
  - Tests/BackwardCompatibility
  - Tests/Fuzz/regressions
  - "**/*.md"
  # All build-tree artifacts (FetchContent deps, Unity builds, Qt MOC autogen)
  - "build-*/**"
