<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wiRedPanda — Architecture</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
  #cy { width: 100%; height: 100vh; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #161b22ee; backdrop-filter: blur(12px);
    border-bottom: 1px solid #30363d;
    padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; color: #e6edf3; white-space: nowrap; }
  #topbar h1 span { color: #7d8590; font-weight: 400; }

  #search {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    color: #c9d1d9; padding: 5px 10px; font-size: 13px; width: 200px; outline: none;
  }
  #search:focus { border-color: #58a6ff; box-shadow: 0 0 0 2px #58a6ff33; }
  #search::placeholder { color: #484f58; }

  .filters { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; cursor: pointer;
    border: 1px solid; transition: all 0.15s; user-select: none; font-weight: 500;
  }
  .pill.active { opacity: 1; }
  .pill.inactive { opacity: 0.35; }

  #info {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: #161b22ee; backdrop-filter: blur(12px);
    border: 1px solid #30363d; border-radius: 10px;
    padding: 14px 18px; max-width: 360px; font-size: 13px;
    line-height: 1.5; display: none;
  }
  #info h3 { font-size: 14px; color: #e6edf3; margin-bottom: 6px; }
  #info .module-tag { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; margin-bottom: 6px; }
  #info .desc { color: #8b949e; }
  #info .deps { margin-top: 8px; color: #8b949e; font-size: 12px; }
  #info .deps span { color: #58a6ff; cursor: pointer; }
  #info .deps span:hover { text-decoration: underline; }
  #info .drill-btn {
    display: inline-block; margin-top: 10px; padding: 5px 14px; border-radius: 6px;
    background: #238636; color: white; font-size: 12px; font-weight: 500;
    cursor: pointer; border: none; transition: background 0.15s;
  }
  #info .drill-btn:hover { background: #2ea043; }

  /* Drill-down overlay */
  #drilldown {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: #0d1117;
  }
  #drilldown.visible { display: flex; flex-direction: column; }
  #drill-header {
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
  }
  #drill-header h2 { font-size: 16px; color: #e6edf3; }
  #drill-header h2 span { font-weight: 400; color: #7d8590; }
  #drill-back {
    padding: 5px 14px; border-radius: 6px; background: #21262d; color: #c9d1d9;
    font-size: 12px; cursor: pointer; border: 1px solid #30363d; transition: background 0.15s;
  }
  #drill-back:hover { background: #30363d; }
  #drill-content { flex: 1; overflow: auto; padding: 24px; }

  /* Flowchart styles */
  .flowchart { max-width: 900px; margin: 0 auto; }
  .flow-node {
    background: #161b22; border: 1.5px solid #30363d; border-radius: 10px;
    padding: 14px 18px; margin: 0 auto; text-align: center; position: relative;
    max-width: 600px;
  }
  .flow-node h4 { font-size: 13px; color: #e6edf3; margin-bottom: 4px; }
  .flow-node p { font-size: 12px; color: #8b949e; line-height: 1.5; margin: 0; }
  .flow-node code { background: #21262d; padding: 1px 5px; border-radius: 3px; font-size: 11px; color: #79c0ff; }
  .flow-node.key { border-color: #d29922; border-width: 2px; }
  .flow-node.phase { border-color: #3fb950; }
  .flow-node.decision { border-color: #a371f7; border-radius: 0; transform: rotate(0deg); }
  .flow-node.start { border-color: #238636; background: #238636; }
  .flow-node.start h4 { color: white; }
  .flow-node.warn { border-color: #da3633; }

  .flow-arrow {
    text-align: center; padding: 6px 0; color: #484f58; font-size: 18px; line-height: 1;
  }
  .flow-arrow .label { font-size: 10px; color: #7d8590; display: block; margin-top: -2px; }

  .flow-branch {
    display: flex; gap: 20px; justify-content: center; margin: 8px 0;
  }
  .flow-branch > div { flex: 1; max-width: 400px; }
  .flow-branch .branch-label {
    text-align: center; font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 4px; margin-bottom: 8px;
  }
  .flow-branch .yes { background: #23863622; color: #3fb950; }
  .flow-branch .no { background: #da363322; color: #f85149; }

  .flow-group {
    border: 1px dashed #30363d; border-radius: 8px; padding: 16px;
    margin: 12px auto; max-width: 700px;
  }
  .flow-group-label {
    font-size: 11px; font-weight: 600; color: #7d8590; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .flow-parallel {
    display: flex; gap: 16px; justify-content: center; margin: 8px 0;
  }
  .flow-parallel > .flow-node { flex: 1; max-width: 280px; }

  /* Gate: decision with error exit branching RIGHT, main path continues DOWN */
  .flow-gate {
    display: flex;
    align-items: flex-start;
    max-width: 720px;
    margin: 0 auto;
  }
  .flow-gate > .gate-main {
    flex: 1;
    text-align: center;
  }
  .flow-gate > .gate-exit {
    width: 240px;
    flex-shrink: 0;
    margin-left: 10px;
    padding-left: 14px;
    border-left: 2px solid #da363366;
  }
  .gate-exit .exit-tag {
    font-size: 10px;
    font-weight: 600;
    color: #f85149;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .gate-exit .flow-node {
    max-width: 226px;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.4;
  }
  .gate-exit.alt { border-left-color: #58a6ff66; }
  .gate-exit.alt .exit-tag { color: #58a6ff; }

  /* Major fork: two substantial paths after a decision */
  .flow-major-fork {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 10px auto;
    max-width: 760px;
  }
  .flow-major-fork > div { flex: 1; max-width: 370px; }
  .fork-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .fork-label.path-a { background: #23863622; color: #3fb950; }
  .fork-label.path-b { background: #da363322; color: #f85149; }
  .fork-label.path-c { background: #58a6ff22; color: #58a6ff; }

  
  /* Flow chart tabs inside drilldown */
  #flow-tabs {
    display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .flow-tab {
    padding: 5px 14px; border-radius: 6px; background: #21262d; color: #c9d1d9;
    font-size: 12px; cursor: pointer; border: 1px solid #30363d; transition: all 0.15s;
  }
  .flow-tab:hover { background: #30363d; }
  .flow-tab.active { background: #238636; border-color: #238636; color: white; font-weight: 500; }
  #flow-cy { border-radius: 8px; border: 1px solid #30363d; background: #0d1117; }
  #flow-info {
    display: none; background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 10px 14px; font-size: 12px; line-height: 1.5; color: #8b949e;
    margin-bottom: 10px; max-width: 700px;
  }
  #flow-info strong { color: #e6edf3; }
  #flow-hint {
    font-size: 11px; color: #484f58; margin-bottom: 8px;
  }
  #flow-hint kbd {
    background: #21262d; border: 1px solid #30363d; border-radius: 3px;
    padding: 1px 5px; font-size: 10px; color: #8b949e;
  }

  #help-hint {
    position: fixed; bottom: 16px; left: 16px; z-index: 100;
    background: #161b22cc; border: 1px solid #30363d; border-radius: 8px;
    padding: 8px 14px; font-size: 11px; color: #484f58; line-height: 1.6;
  }
  #help-hint kbd {
    background: #21262d; border: 1px solid #30363d; border-radius: 3px;
    padding: 1px 5px; font-size: 10px; color: #8b949e;
  }

  #stats { margin-left: auto; font-size: 11px; color: #484f58; white-space: nowrap; }
</style>
</head>
<body>

<div id="topbar">
  <h1>wiRedPanda <span>Architecture</span></h1>
  <input id="search" type="text" placeholder="Search classes... ( / )" autocomplete="off">
  <div class="filters" id="filters"></div>
  <div id="stats"></div>
</div>

<div id="cy"></div>
<div id="info"></div>

<div id="help-hint">
  <kbd>Scroll</kbd> Zoom &nbsp; <kbd>Drag</kbd> Pan &nbsp; <kbd>Click</kbd> inspect &nbsp;
  <kbd>Double-click</kbd> drill down &nbsp; <kbd>Esc</kbd> reset &nbsp; <kbd>/</kbd> search
</div>

<!-- Drill-down overlay -->
<div id="drilldown">
  <div id="drill-header">
    <button id="drill-back">← Back to Overview</button>
    <h2 id="drill-title"></h2>
  </div>
  <div id="drill-content"></div>
</div>

<script>

const modules = {

        ['single',     'Single pass:\nupdateLogic()\nin topo order', 'step', 'Highest priority first'],
        ['settle',     'iterativeSettle()\nloop up to 10x',       'error',    '1. clearOutputChanged() 2. updateLogic() on all 3. Check if any changed. Converged \u2192 break. Not \u2192 emit warning'],

        ['p3',         'Phase 3:\nupdatePort(output)',             'end',      'Push logic values onto wire visuals'],

drilldowns['UI'] = {
  title: 'UI Layer',
  subtitle: 'MainWindow and its panels',
  flows: [

// ── Manual compact layout — no fcose, no empty space ──────────
function runCompactLayout() {
  const cellW = 105;
  const cellH = 34;
  const modGap = 18;

  // Measure each module: grid its children, return width/height
  const modSizes = {};
  const modChildren = {};
  for (const mod of Object.keys(modules)) {
    const children = cy.getElementById(`mod_${mod}`).children().filter(n => n.visible());
    modChildren[mod] = children;
    const n = children.length;
    if (n === 0) { modSizes[mod] = { w: 0, h: 0, cols: 0, rows: 0 }; continue; }
    const cols = Math.ceil(Math.sqrt(n * 1.6)); // wider than tall
    const rows = Math.ceil(n / cols);
    modSizes[mod] = { w: cols * cellW, h: rows * cellH + 16, cols, rows };
  }

  // Arrange modules in rows using bin-packing (first-fit decreasing height)
  const modOrder = Object.keys(modules).filter(m => modSizes[m].w > 0);
  modOrder.sort((a, b) => modSizes[b].w * modSizes[b].h - modSizes[a].w * modSizes[a].h);

  const maxRowW = 1100;
  const modPositions = {};
  let curX = 0, curY = 0, rowH = 0;

  for (const mod of modOrder) {
    const sz = modSizes[mod];
    if (curX + sz.w > maxRowW && curX > 0) {
      curX = 0;
      curY += rowH + modGap;
      rowH = 0;
    }
    modPositions[mod] = { x: curX, y: curY };
    curX += sz.w + modGap;
    rowH = Math.max(rowH, sz.h);
  }

  // Position children in grid inside each module
  for (const mod of Object.keys(modules)) {
    const children = modChildren[mod];
    if (children.length === 0) continue;
    const sz = modSizes[mod];
    const mp = modPositions[mod];
    const sorted = children.sort((a, b) => b.connectedEdges().length - a.connectedEdges().length);

    sorted.forEach((node, i) => {
      const col = i % sz.cols;
      const row = Math.floor(i / sz.cols);
      node.position({
        x: mp.x + col * cellW + cellW / 2,
        y: mp.y + row * cellH + cellH / 2 + 16,
      });
    });
  }

  cy.fit(undefined, 30);
}

runCompactLayout();

const filtersEl = document.getElementById('filters');
const filterState = {};
for (const [mod, info] of Object.entries(modules)) {
  filterState[mod] = true;
  const pill = document.createElement('div');
  pill.className = 'pill active';
  pill.textContent = info.label;
  pill.style.borderColor = info.color;
  pill.style.color = info.color;
  pill.style.backgroundColor = info.color + '18';
  pill.dataset.mod = mod;
  pill.addEventListener('click', () => {
    filterState[mod] = !filterState[mod];
    pill.className = `pill ${filterState[mod] ? 'active' : 'inactive'}`;
    const modNode = cy.getElementById(`mod_${mod}`);
    const children = modNode.children();
    const connEdges = children.connectedEdges();
    if (filterState[mod]) {
      modNode.style('display', 'element');
      children.style('display', 'element');
      connEdges.forEach(e => {
        const sm = e.source().data('module'), tm = e.target().data('module');
        if (filterState[sm] && filterState[tm]) e.style('display', 'element');
      });
    } else {
      modNode.style('display', 'none');
      children.style('display', 'none');
      connEdges.style('display', 'none');
    }
  });
  filtersEl.appendChild(pill);
}

let highlightActive = false;

cy.on('tap', '.classNode', function(e) {
  const node = e.target;
  highlightActive = true;
  cy.elements().addClass('faded').removeClass('highlighted highlighted-edge');
  const neighborhood = node.neighborhood().add(node);
  neighborhood.nodes().removeClass('faded').addClass('highlighted');
  neighborhood.edges().removeClass('faded').addClass('highlighted-edge');
  neighborhood.nodes().forEach(n => { const p = n.parent(); if (p.length) p.removeClass('faded'); });
  showInfo(node);
});

// Double-click on module compound node → drill down
cy.on('dbltap', '.module', function(e) {
  const mod = e.target.data('module');
  if (drilldowns[mod]) openDrilldown(mod);
});

// Double-click on class node → drill down to its module
cy.on('dbltap', '.classNode', function(e) {
  const nodeId = e.target.id();
  if (nodeDrilldowns[nodeId]) { openNodeDrilldown(nodeId); return; }
  const mod = e.target.data('module');
  if (drilldowns[mod]) openDrilldown(mod);
});

cy.on('tap', function(e) { if (e.target === cy) resetHighlight(); });
cy.on('dbltap', function(e) {
  if (e.target === cy) { resetHighlight(); cy.animate({ fit: { padding: 60 }, duration: 400 }); }
});

function resetHighlight() {
  highlightActive = false;
  cy.elements().removeClass('faded highlighted highlighted-edge search-match');
  document.getElementById('info').style.display = 'none';
}

// ── Info panel ───────────────────────────────────────────────
function showInfo(node) {
  const info = document.getElementById('info');
  const mod = node.data('module');
  const nodeId = node.id();
  const color = modules[mod]?.color || '#8b949e';
  const incoming = node.incomers('edge').map(e => e.source());
  const outgoing = node.outgoers('edge').map(e => e.target());

  const depLinks = (arr, dir) => {
    if (!arr.length) return '';
    const unique = [...new Map(arr.map(n => [n.id(), n])).values()];
    return `<div class="deps">${dir}: ${unique.map(n => `<span onclick="focusNode('${n.id()}')">${n.data('label')}</span>`).join(', ')}</div>`;
  };

  const nodeDrill = nodeDrilldowns[nodeId];
  const drillBtn = nodeDrill
    ? `<button class="drill-btn" onclick="openNodeDrilldown('${nodeId}')">${nodeDrill.title.split('—')[0].trim()} →</button>`
    : (drilldowns[mod]
        ? `<button class="drill-btn" onclick="openDrilldown('${mod}')">Open ${mod} flowchart →</button>`
        : '');

  info.innerHTML = `
    <h3>${node.data('label')}</h3>
    <div class="module-tag" style="background:${color}22;color:${color};border:1px solid ${color}44">${mod}</div>
    <div class="desc">${node.data('desc')}</div>
    ${depLinks(incoming, '← Used by')}
    ${depLinks(outgoing, '→ Depends on')}
    ${drillBtn}
  `;
  info.style.display = 'block';
}

window.focusNode = function(id) {
  const node = cy.getElementById(id);
  if (node.length) { cy.animate({ center: { eles: node }, zoom: 1.5, duration: 400 }); node.emit('tap'); }
};

// ── Drill-down ───────────────────────────────────────────────
window.openDrilldown = function(mod) {
  const dd = drilldowns[mod];
  if (!dd) return;
  const color = modules[mod]?.color || '#8b949e';
  document.getElementById('drill-title').innerHTML = `${dd.title} <span>— ${dd.subtitle}</span>`;
  document.getElementById('drill-title').style.color = color;

  if (dd.flows) {
    // Cytoscape-based flowchart
    const content = document.getElementById('drill-content');
    content.innerHTML = `
      <div id="flow-hint"><kbd>Click</kbd> node for details \u00a0 <kbd>Scroll</kbd> zoom \u00a0 <kbd>Drag</kbd> pan</div>
      <div id="flow-tabs"></div>
      <div id="flow-info"></div>
      <div id="flow-cy" style="width:100%;height:calc(100vh - 180px);min-height:400px;"></div>
    `;
    const tabsEl = document.getElementById('flow-tabs');
    dd.flows.forEach((flow, i) => {
      const btn = document.createElement('button');
      btn.textContent = flow.name;
      btn.className = 'flow-tab' + (i === 0 ? ' active' : '');
      btn.onclick = () => {
        tabsEl.querySelectorAll('.flow-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('flow-info').style.display = 'none';
        renderFlowChart('flow-cy', flow, color);
      };
      tabsEl.appendChild(btn);
    });
    document.getElementById('drilldown').classList.add('visible');
    setTimeout(() => renderFlowChart('flow-cy', dd.flows[0], color), 60);
  } else {
    // Legacy HTML drilldown
    document.getElementById('drill-content').innerHTML = dd.html;
    document.getElementById('drilldown').classList.add('visible');
  }
};

let flowCy = null;

function renderFlowChart(containerId, flow, accentColor) {
  if (flowCy) { flowCy.destroy(); flowCy = null; }
  const container = document.getElementById(containerId);
  if (!container) return;
  const elements = [];

  for (const n of flow.nodes) {
    elements.push({
      data: { id: n[0], label: n[1], nodeType: n[2] || 'step', desc: n[3] || '' },
      classes: n[2] || 'step'
    });
  }
  for (let i = 0; i < flow.edges.length; i++) {
    const e = flow.edges[i];
    elements.push({
      data: { id: `fe_${i}`, source: e[0], target: e[1], label: e[2] || '' }
    });
  }

  flowCy = cytoscape({
    container,
    elements,
    style: [
      { selector: 'node', style: {
        'shape': 'round-rectangle', 'width': 'label', 'height': 'label', 'padding': '10px',
        'background-color': '#161b22', 'border-width': 2, 'border-color': '#30363d',
        'label': 'data(label)', 'font-size': 11, 'color': '#c9d1d9',
        'text-valign': 'center', 'text-halign': 'center',
        'text-wrap': 'wrap', 'text-max-width': 180,
      }},
      { selector: '.start', style: {
        'background-color': '#238636', 'border-color': '#2ea043',
        'color': '#ffffff', 'font-weight': 'bold',
      }},
      { selector: '.decision', style: {
        'shape': 'diamond', 'background-color': '#0d1117',
        'border-color': '#a371f7', 'border-width': 2.5,
        'padding': '16px', 'text-max-width': 140, 'font-size': 10,
      }},
      { selector: '.key', style: { 'border-color': '#d29922', 'border-width': 2.5 }},
      { selector: '.error', style: {
        'border-color': '#da3633', 'border-width': 2,
        'background-color': '#da363315', 'color': '#f85149', 'font-size': 10,
      }},
      { selector: '.end', style: { 'border-color': '#3fb950', 'border-width': 2.5 }},
      { selector: 'edge', style: {
        'width': 1.5, 'line-color': '#484f58', 'target-arrow-color': '#484f58',
        'target-arrow-shape': 'triangle', 'arrow-scale': 1.0,
        'curve-style': 'taxi', 'taxi-direction': 'downward', 'taxi-turn': '20px',
        'label': 'data(label)', 'font-size': 9, 'color': '#7d8590',
        'text-background-color': '#0d1117', 'text-background-opacity': 0.9,
        'text-background-padding': '3px', 'text-rotation': 'autorotate',
      }},
      { selector: 'edge[label *= "Yes"]', style: {
        'line-color': '#3fb95077', 'target-arrow-color': '#3fb950', 'color': '#3fb950',
      }},
      { selector: 'edge[label *= "No"]', style: {
        'line-color': '#da363377', 'target-arrow-color': '#da3633', 'color': '#f85149',
      }},
      { selector: '.fc-highlight', style: {
        'border-width': 3.5, 'z-index': 999,
      }},
      { selector: '.fc-fade', style: { 'opacity': 0.25 }},
    ],
    layout: {
      name: 'dagre',
      rankDir: 'TB',
      nodeSep: 50,
      rankSep: 55,
      edgeSep: 20,
      ranker: 'longest-path',
    },
    wheelSensitivity: 0.3, minZoom: 0.2, maxZoom: 2.5,
  });

  // Click node to show description + highlight neighbourhood
  flowCy.on('tap', 'node', function(e) {
    const node = e.target;
    flowCy.elements().removeClass('fc-highlight fc-fade');
    const hood = node.neighborhood().add(node);
    flowCy.elements().not(hood).addClass('fc-fade');
    hood.addClass('fc-highlight');
    const desc = node.data('desc');
    const info = document.getElementById('flow-info');
    if (desc) {
      info.innerHTML = '<strong>' + node.data('label').replace(/\n/g, ' ') + '</strong><br>' + desc;
      info.style.display = 'block';
    } else {
      info.style.display = 'none';
    }
  });
  flowCy.on('tap', function(e) {
    if (e.target === flowCy) {
      flowCy.elements().removeClass('fc-highlight fc-fade');
      document.getElementById('flow-info').style.display = 'none';
    }
  });

  flowCy.ready(() => flowCy.fit(undefined, 40));
}

window.openNodeDrilldown = function(nodeId) {
  const dd = nodeDrilldowns[nodeId];
  if (!dd || !dd.flows) return;
  const mod = cy.getElementById(nodeId).data('module');
  const color = modules[mod]?.color || '#8b949e';

  document.getElementById('drill-title').innerHTML = `${dd.title} <span>\u2014 ${dd.subtitle}</span>`;
  document.getElementById('drill-title').style.color = color;

  const content = document.getElementById('drill-content');
  content.innerHTML = `
    <div id="flow-hint"><kbd>Click</kbd> node for details \u00a0 <kbd>Scroll</kbd> zoom \u00a0 <kbd>Drag</kbd> pan</div>
    <div id="flow-tabs"></div>
    <div id="flow-info"></div>
    <div id="flow-cy" style="width:100%;height:calc(100vh - 180px);min-height:400px;"></div>
  `;

  const tabsEl = document.getElementById('flow-tabs');
  dd.flows.forEach((flow, i) => {
    const btn = document.createElement('button');
    btn.textContent = flow.name;
    btn.className = 'flow-tab' + (i === 0 ? ' active' : '');
    btn.onclick = () => {
      tabsEl.querySelectorAll('.flow-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('flow-info').style.display = 'none';
      renderFlowChart('flow-cy', flow, color);
    };
    tabsEl.appendChild(btn);
  });

  document.getElementById('drilldown').classList.add('visible');
  setTimeout(() => renderFlowChart('flow-cy', dd.flows[0], color), 60);
};

document.getElementById('drill-back').addEventListener('click', () => {
  document.getElementById('drilldown').classList.remove('visible');
  if (flowCy) { flowCy.destroy(); flowCy = null; }
});

// ── Search ───────────────────────────────────────────────────
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', () => {
  const q = searchEl.value.trim().toLowerCase();
  cy.elements().removeClass('search-match faded highlighted highlighted-edge');
  if (!q) { document.getElementById('info').style.display = 'none'; return; }
  const matches = cy.nodes('.classNode').filter(n =>
    n.data('label').toLowerCase().includes(q) || n.data('desc').toLowerCase().includes(q)
  );
  if (matches.length > 0 && matches.length < 20) {
    cy.elements().addClass('faded');
    matches.forEach(m => { m.removeClass('faded').addClass('search-match'); const p = m.parent(); if (p.length) p.removeClass('faded'); });
    if (matches.length === 1) { cy.animate({ center: { eles: matches[0] }, duration: 300 }); showInfo(matches[0]); }
  } else { matches.addClass('search-match'); }
});

// ── Keyboard ─────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('drilldown').classList.contains('visible')) {
      document.getElementById('drilldown').classList.remove('visible');
    } else {
      searchEl.value = ''; searchEl.blur(); resetHighlight();
    }
  }
  if (e.key === '/' && document.activeElement !== searchEl) { e.preventDefault(); searchEl.focus(); }
});

// ── Stats ────────────────────────────────────────────────────
document.getElementById('stats').textContent =
  `${cy.nodes('.classNode').length} classes · ${cy.edges().length} connections · ${Object.keys(drilldowns).length + Object.keys(nodeDrilldowns).length} drill-downs`;

cy.ready(() => cy.fit(undefined, 60));
</script>
