<!-- Doxygen custom header — matches the wiRedPanda Astro site layout -->
<!-- This file is referenced by HTML_HEADER in the Doxyfile.                 -->
<!-- Doxygen replaces $-prefixed variables at generation time.               -->
<!-- Based on doxygen 1.16.1's stock templates/html/header.html (the version -->
<!-- .github/workflows/site.yml pins — the newest doxygen-awesome-css's own  -->
<!-- README claims compatibility with: "Works best with Doxygen 1.9.1 -      -->
<!-- 1.9.4 and 1.9.6 - 1.16.1"; 1.17.0 dropped jquery.js internally, which   -->
<!-- doxygen-awesome's own darkmode-toggle.js/fragment-copy-button.js still  -->
<!-- need — don't bump past 1.16.1 without re-checking that). Every         -->
<!-- BEGIN/END conditional block below is kept verbatim from the stock      -->
<!-- template so Doxyfile setting changes keep working; when bumping the    -->
<!-- pinned doxygen version, regenerate a fresh template with               -->
<!-- `doxygen -w html new-header.html new-footer.html x.css` and diff it    -->
<!-- against this file to see what upstream changed.                       -->

<!--BEGIN COPY_CLIPBOARD-->

<!--END COPY_CLIPBOARD-->
<!-- Theme init: prevent FOUC by applying dark class before first paint -->
<script>
(function() {
  var stored = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (stored === 'dark' || (!stored && prefersDark)) {
    document.documentElement.classList.add('dark-mode');
  }
})();
</script>
$treeview
$search
$mathjax
$darkmode
<link href="$relpath^$stylesheet" rel="stylesheet" type="text/css" />
$extrastylesheet
