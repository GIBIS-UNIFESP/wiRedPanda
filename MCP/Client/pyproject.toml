# Python tooling configuration for MCP/Client/.
# Ruff's config still lives in ruff.toml.

[tool.deptry]
# Override deptry's default exclude (which silently skips tests/) so checks
# against test files (where psutil is imported, for example) work correctly.
exclude = ["venv", "\\.venv", "\\.direnv", "\\.git", "setup\\.py"]

[tool.deptry.per_rule_ignores]
# DEP002: declared in requirements.txt but never `import`ed. Each of these is
# either a dev CLI tool (no source `import` ever), or a typing-stub package
# consumed implicitly by mypy / pyright at type-check time.
DEP002 = [
    # Dev tooling — run from the venv shell, not imported
    "ruff",
    "pylint",
    "mypy",
    "pyright",
    "pyrefly",
    "vulture",
    "deptry",
    "import-linter",
    # Type stubs — picked up implicitly by the type checkers, no import sites
    "types-jsonschema",
    "types-psutil",
]

[tool.importlinter]
# All MCP/Client/ modules live in real packages (__init__.py-bearing
# directories), so grimp can walk the entire import graph and enforce
# layering across the whole client.
root_packages = ["mcp_client", "domain", "protocol", "tests"]

[[tool.importlinter.contracts]]
name = "domain and protocol must not import from tests/ or mcp_client/"
type = "forbidden"
source_modules = ["domain", "protocol"]
forbidden_modules = ["tests", "mcp_client"]

[[tool.importlinter.contracts]]
name = "domain must not depend on protocol (one-way layering)"
type = "forbidden"
source_modules = ["domain"]
forbidden_modules = ["protocol"]

[[tool.importlinter.contracts]]
# Data-layer modules (pure pydantic/dataclass definitions) must not pull
# in test infrastructure, process management, or any other client sibling.
# They may only depend on stdlib, third-party libs, and the protocol/ +
# domain/ packages.
name = "mcp_client data models stay free of client infrastructure"
type = "forbidden"
source_modules = ["mcp_client.mcp_models"]
forbidden_modules = [
    "mcp_client.mcp_circuit_builder",
    "mcp_client.mcp_infrastructure",
    "mcp_client.mcp_organizer",
    "mcp_client.mcp_output",
    "mcp_client.mcp_runner",
    "mcp_client.mcp_schema_validator",
    "mcp_client.mcp_test_config",
    "mcp_client.mcp_validation",
    "mcp_client.wiredpanda_bridge",
]
